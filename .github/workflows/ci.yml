name: CI, Deploy, E2E
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: 'eu-west-2'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Install LLRT test runner
        run: npx lerna run install-llrt-test-runner-linux --scope=@short-as/lambda

      - name: Run tests
        run: npx lerna run test

      - name: Install moto
        run: pip3 install "moto[server]"

      - name: Run integration tests
        run: npx lerna run test:integration --scope=@short-as/lambda

      - name: Build site (dev)
        if: ${{ github.event_name == 'pull_request' }}
        run: npx lerna run build:dev --scope=@short-as/site

      - name: cdk diff (dev)
        if: ${{ github.event_name == 'pull_request' }}
        working-directory: ./packages/infra/
        run: npx cdk diff '@(Backend-dev|Website-dev)'

      - name: cdk deploy (dev)
        if: ${{ github.event_name == 'pull_request' }}
        working-directory: ./packages/infra/
        run: npx cdk deploy '@(Backend-dev|Website-dev)' --require-approval never

      - name: cdk diff (prod)
        if: ${{ github.event_name == 'push' }}
        working-directory: ./packages/infra/
        run: npx cdk diff '@(Domain-prod|Backend-prod|Website-prod)'

      - name: cdk deploy (prod)
        if: ${{ github.event_name == 'push' }}
        working-directory: ./packages/infra/
        run: npx cdk deploy '@(Domain-prod|Backend-prod|Website-prod)' --require-approval never

  e2e:
    runs-on: ubuntu-latest
    needs: ci-and-deploy
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: 'eu-west-2'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: ./packages/e2e/
        run: npm ci

      - name: Install Chromium
        working-directory: ./packages/e2e/
        run: npx playwright install chromium --with-deps

      - name: Run e2e tests
        working-directory: ./packages/e2e/
        run: npx playwright test
        env:
          BASE_URL: ${{ github.event_name == 'push' && 'https://short.as' || 'https://dev.short.as' }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 30
